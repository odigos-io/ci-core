name: Cherry Pick
description: |
  Backport merged PRs to release branches when the PR description contains
  `cherry-pick: v{major}.X` (comma-separated versions; major defaults to 1).

  - operation: extract — resolve the merged PR for a push commit and parse target versions.
  - operation: backport — cherry-pick one version onto its release branch and open a pull request.

inputs:
  operation:
    description: "'extract' to parse versions from a merged PR; 'backport' to cherry-pick one version"
    required: true

  # ── shared ──────────────────────────────────────────────────────────────────
  sts-scope:
    description: GitHub repo scope for STS tokens (owner/repo).
    required: false
    default: ${{ github.repository }}
  base-branch:
    description: Base branch merged PRs must target (e.g. main).
    required: false
    default: main
  release-branch-prefix:
    description: Prefix for release branches (version is appended, then suffix).
    required: false
    default: releases/
  release-branch-suffix:
    description: Suffix after the version in release branch names (e.g. .0 for releases/v1.3.0).
    required: false
    default: ".0"
  major-version:
    description: Expected major version in cherry-pick lines (e.g. 1 for v1.3 or 0 for v0.8).
    required: false
    default: "1"

  # ── extract ─────────────────────────────────────────────────────────────────
  cherry-pick-decision-identity:
    description: STS identity for reading merged PR metadata on push to main.
    required: false
    default: cherry-pick-decision
  commit-sha:
    description: Commit SHA to resolve the merged PR for (defaults to github.sha).
    required: false
    default: ${{ github.sha }}

  # ── backport ────────────────────────────────────────────────────────────────
  create-pr-identity:
    description: STS identity for creating cherry-pick pull requests.
    required: false
    default: create-pr
  version:
    description: Release version to backport (e.g. v1.3). Required for backport.
    required: false
  merge-commit-sha:
    description: Merge commit SHA from the original PR. Required for backport.
    required: false
  pr-number:
    description: Original PR number. Required for backport.
    required: false
  pr-title:
    description: Original PR title. Required for backport.
    required: false
  pr-user-login:
    description: Original PR author login. Required for backport.
    required: false
  original-pr-body:
    description: Original PR body text. Required for backport.
    required: false
  slack-webhook-url:
    description: Slack webhook URL for backport status notifications.
    required: false

outputs:
  run_cherry_pick:
    description: Whether any valid cherry-pick versions were found (extract)
    value: ${{ steps.publish.outputs.run_cherry_pick }}
  versions:
    description: JSON array of versions to backport, e.g. ["v1.3","v1.4"] (extract)
    value: ${{ steps.publish.outputs.versions }}
  pr_number:
    description: Original merged PR number (extract)
    value: ${{ steps.publish.outputs.pr_number }}
  merge_commit_sha:
    description: Merge commit SHA from the original PR (extract)
    value: ${{ steps.publish.outputs.merge_commit_sha }}
  pr_title:
    description: Original PR title (extract)
    value: ${{ steps.publish.outputs.pr_title }}
  pr_user_login:
    description: Original PR author login (extract)
    value: ${{ steps.publish.outputs.pr_user_login }}
  original_pr_body:
    description: Original PR body (extract)
    value: ${{ steps.publish.outputs.original_pr_body }}
  pull-request-url:
    description: URL of the created cherry-pick PR (backport)
    value: ${{ steps.create_pr.outputs.pull-request-url }}

runs:
  using: composite
  steps:

    # ── EXTRACT ───────────────────────────────────────────────────────────────

    - name: Get STS token (extract)
      id: sts-cherry-pick-decision
      if: ${{ inputs.operation == 'extract' }}
      uses: odigos-io/ci-core/sts@main
      with:
        scope: ${{ inputs.sts-scope }}
        identity: ${{ inputs.cherry-pick-decision-identity }}
        output-git-config: "true"

    - name: Find merged PR for commit
      id: find_pr
      if: ${{ inputs.operation == 'extract' }}
      shell: bash
      env:
        GH_TOKEN: ${{ steps.sts-cherry-pick-decision.outputs.GH_TOKEN }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        SHA: ${{ inputs.commit-sha }}
      run: |
        set -euo pipefail
        REPO="${{ github.repository }}"
        mkdir -p .cherry-pick-workflow
        ERR_LOG=".cherry-pick-workflow/gh-api-stderr.log"

        set +e
        PR_JSON=$(gh api "repos/${REPO}/commits/${SHA}/pulls" \
          --jq "[.[] | select(.merged_at != null and .base.ref == \"${BASE_BRANCH}\")] | sort_by(.merged_at) | reverse | .[0] // empty" 2>"$ERR_LOG")
        GH_EXIT=$?
        set -euo pipefail

        if [[ -s "$ERR_LOG" ]]; then
          echo "::warning::gh api stderr while listing PRs for commit $SHA:"
          cat "$ERR_LOG"
        fi

        if [[ "$GH_EXIT" -ne 0 ]]; then
          echo "::error::gh api failed (exit $GH_EXIT) listing pull requests for commit $SHA. This is not the same as having no linked PR; fix auth, rate limits, or API usage. See stderr in the warning above."
          exit 1
        fi

        if [[ -z "$PR_JSON" || "$PR_JSON" == "null" ]]; then
          echo "No merged PR associated with commit $SHA (e.g. direct push to ${BASE_BRANCH})"
          echo "has_pr=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        printf '%s\n' "$PR_JSON" > .cherry-pick-workflow/pr.json
        echo "has_pr=true" >> "$GITHUB_OUTPUT"
        echo "Found merged PR $(jq -r '.number' .cherry-pick-workflow/pr.json) for commit $SHA"

    - name: Write PR metadata and body files
      id: pr_files
      if: ${{ inputs.operation == 'extract' && steps.find_pr.outputs.has_pr == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        PR_JSON=".cherry-pick-workflow/pr.json"
        jq -r '.body // empty' "$PR_JSON" > .cherry-pick-workflow/pr_body.txt
        jq -r '.title // empty' "$PR_JSON" > .cherry-pick-workflow/pr_title.txt

    - name: Parse cherry-pick versions from PR body
      id: parse_versions
      if: ${{ inputs.operation == 'extract' && steps.find_pr.outputs.has_pr == 'true' && steps.pr_files.outcome == 'success' }}
      shell: bash
      env:
        MAJOR_VERSION: ${{ inputs.major-version }}
      run: |
        set -euo pipefail
        MAJOR="${MAJOR_VERSION:-1}"
        PR_BODY=$(cat .cherry-pick-workflow/pr_body.txt)

        CHERRY_PICK_LINE=$(echo "$PR_BODY" | grep -i "^cherry-pick:" || true)
        if [[ -z "$CHERRY_PICK_LINE" ]]; then
          echo "No cherry-pick marker found in PR description"
          echo "versions=[]" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "Found cherry-pick line: $CHERRY_PICK_LINE"
        VERSIONS_STR=$(printf '%s' "$CHERRY_PICK_LINE" | tr -d '\r' | sed -E 's/^[Cc]herry-pick:\s*//')

        VALID_VERSIONS=()
        IFS=',' read -ra VERSION_ARRAY <<< "$VERSIONS_STR"
        for version in "${VERSION_ARRAY[@]}"; do
          version=$(printf '%s' "$version" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          if [[ "$version" =~ ^${MAJOR}\.[0-9]+$ ]]; then
            version="v${version}"
          fi
          if [[ "$version" =~ ^v${MAJOR}\.[0-9]+$ ]]; then
            VALID_VERSIONS+=("\"$version\"")
            echo "Valid version found: $version"
          else
            echo "Warning: Invalid version format '$version' (expected v${MAJOR}.X or ${MAJOR}.X)"
          fi
        done

        if [[ ${#VALID_VERSIONS[@]} -eq 0 ]]; then
          echo "versions=[]" >> "$GITHUB_OUTPUT"
          echo "No valid cherry-pick versions found"
        else
          JSON_ARRAY="[$(IFS=,; echo "${VALID_VERSIONS[*]}")]"
          echo "versions=$JSON_ARRAY" >> "$GITHUB_OUTPUT"
          echo "Cherry-pick versions to process: $JSON_ARRAY"
        fi

    - name: Publish extract outputs
      id: publish
      if: ${{ inputs.operation == 'extract' && always() && steps.find_pr.outcome == 'success' }}
      shell: bash
      env:
        PARSE_VERSIONS: ${{ steps.parse_versions.outputs.versions }}
      run: |
        set -euo pipefail

        if [[ "${{ steps.find_pr.outputs.has_pr }}" != "true" ]]; then
          echo "run_cherry_pick=false" >> "$GITHUB_OUTPUT"
          echo "versions=[]" >> "$GITHUB_OUTPUT"
          echo "pr_number=" >> "$GITHUB_OUTPUT"
          echo "merge_commit_sha=" >> "$GITHUB_OUTPUT"
          echo "pr_title=" >> "$GITHUB_OUTPUT"
          echo "pr_user_login=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [[ "${{ steps.pr_files.outcome }}" != "success" || "${{ steps.parse_versions.outcome }}" != "success" ]]; then
          echo "::error::PR file or version parse step did not succeed"
          exit 1
        fi

        PR_JSON=".cherry-pick-workflow/pr.json"
        echo "pr_number=$(jq -r '.number' "$PR_JSON")" >> "$GITHUB_OUTPUT"
        echo "merge_commit_sha=$(jq -r '.merge_commit_sha' "$PR_JSON")" >> "$GITHUB_OUTPUT"
        echo "pr_user_login=$(jq -r '.user.login // empty' "$PR_JSON")" >> "$GITHUB_OUTPUT"

        echo "pr_title<<EOF" >> "$GITHUB_OUTPUT"
        cat .cherry-pick-workflow/pr_title.txt >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

        VERSIONS="${PARSE_VERSIONS:-[]}"
        echo "versions=$VERSIONS" >> "$GITHUB_OUTPUT"

        if [[ "$VERSIONS" != "[]" ]]; then
          echo "run_cherry_pick=true" >> "$GITHUB_OUTPUT"
          {
            echo 'original_pr_body<<PRBODY'
            cat .cherry-pick-workflow/pr_body.txt
            echo 'PRBODY'
          } >> "$GITHUB_OUTPUT"
        else
          echo "run_cherry_pick=false" >> "$GITHUB_OUTPUT"
        fi

    # ── BACKPORT ──────────────────────────────────────────────────────────────

    - name: Get STS token (backport)
      id: cherry-pick-pr-sts
      if: ${{ inputs.operation == 'backport' }}
      uses: odigos-io/ci-core/sts@main
      with:
        scope: ${{ inputs.sts-scope }}
        identity: ${{ inputs.create-pr-identity }}
        output-git-config: true

    - name: Determine release branch
      id: branch
      if: ${{ inputs.operation == 'backport' }}
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        RELEASE_BRANCH_PREFIX: ${{ inputs.release-branch-prefix }}
        RELEASE_BRANCH_SUFFIX: ${{ inputs.release-branch-suffix }}
      run: |
        RELEASE_BRANCH="${RELEASE_BRANCH_PREFIX}${VERSION}${RELEASE_BRANCH_SUFFIX}"
        echo "release_branch=$RELEASE_BRANCH" >> "$GITHUB_OUTPUT"
        echo "Processing version $VERSION -> branch $RELEASE_BRANCH"

    - name: Checkout release branch
      if: ${{ inputs.operation == 'backport' }}
      uses: actions/checkout@v6
      with:
        ref: ${{ steps.branch.outputs.release_branch }}
        fetch-depth: 0
        token: ${{ steps.cherry-pick-pr-sts.outputs.GH_TOKEN }}

    - name: Verify release branch exists
      if: ${{ inputs.operation == 'backport' }}
      shell: bash
      env:
        GH_TOKEN: ${{ steps.cherry-pick-pr-sts.outputs.GH_TOKEN }}
      run: |
        RELEASE_BRANCH="${{ steps.branch.outputs.release_branch }}"
        if ! git ls-remote --exit-code --heads origin "$RELEASE_BRANCH" > /dev/null 2>&1; then
          echo "Error: Release branch '$RELEASE_BRANCH' does not exist"
          exit 1
        fi
        echo "Release branch '$RELEASE_BRANCH' exists"

    - name: Cherry pick commit
      id: cherry_pick
      if: ${{ inputs.operation == 'backport' }}
      shell: bash
      env:
        MERGE_COMMIT: ${{ inputs.merge-commit-sha }}
        BASE_BRANCH: ${{ inputs.base-branch }}
      run: |
        echo "Cherry-picking commit $MERGE_COMMIT"

        git fetch origin "$BASE_BRANCH"

        git config user.name "$(git log -1 --format='%an' "$MERGE_COMMIT")"
        git config user.email "$(git log -1 --format='%ae' "$MERGE_COMMIT")"

        PARENT_COUNT=$(git rev-list --parents -n 1 "$MERGE_COMMIT" 2>/dev/null | awk '{print NF-1}' || echo 0)
        if [[ "$PARENT_COUNT" -gt 1 ]]; then
          echo "Merge commit detected; using cherry-pick -m 1"
          if ! git cherry-pick -m 1 "$MERGE_COMMIT"; then
            echo "Cherry-pick failed. There may be conflicts."
            git cherry-pick --abort || true
            exit 1
          fi
        else
          echo "Single-parent commit (e.g. squash merge); cherry-pick without -m"
          if ! git cherry-pick "$MERGE_COMMIT"; then
            echo "Cherry-pick failed. There may be conflicts."
            git cherry-pick --abort || true
            exit 1
          fi
        fi

        echo "Successfully cherry-picked commit $MERGE_COMMIT"

    - name: Create pull request
      id: create_pr
      if: ${{ inputs.operation == 'backport' }}
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ steps.cherry-pick-pr-sts.outputs.GH_TOKEN }}
        branch: cherry-pick/${{ inputs.version }}/${{ inputs.pr-number }}
        base: ${{ steps.branch.outputs.release_branch }}
        title: "Cherry-pick: ${{ inputs.pr-title }} (backport to ${{ inputs.version }})"
        body: |
          This PR cherry-picks #${{ inputs.pr-number }} to the ${{ inputs.version }} release branch.

          Original PR: #${{ inputs.pr-number }}
          Original Author: @${{ inputs.pr-user-login }}

          ---

          ${{ inputs.original-pr-body }}
        labels: cherry-pick

    - name: Notify Slack
      if: ${{ inputs.operation == 'backport' && always() && inputs.slack-webhook-url != '' }}
      uses: odigos-io/ci-core/.github/actions/slack-release-notification@main
      with:
        webhook-url: ${{ inputs.slack-webhook-url }}
        success-description: "Cherry-pick PR created for ${{ inputs.version }}: ${{ steps.create_pr.outputs.pull-request-url }}"
        failure-description: "ERROR: Failed to cherry-pick PR #${{ inputs.pr-number }} to ${{ inputs.version }}"
        tag: ${{ inputs.version }}
