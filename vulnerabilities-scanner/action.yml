name: "Vulnerability Scanner (Grype)"
description: "Scan container images or filesystem paths for vulnerabilities using Grype"

inputs:
  image:
    description: "The container image to scan, use complete image reference (e.g., 'nginx:latest' or 'myregistry.com/myimage:tag')"
    required: false
  path:
    description: "Path to the file system to scan (e.g., a directory containing source code or extracted image layers)"
    required: false
  severity-cutoff:
    description: "Comma-separated list of severity levels that will cause the workflow to fail (e.g., 'HIGH,CRITICAL' or 'CRITICAL'). Leave empty to never fail."
    required: false
    default: "HIGH,CRITICAL"
  verbosity:
    description: "Verbosity level for the summary (basic or detailed)"
    required: false
    default: "basic"

outputs:
  results-json:
    description: "The raw Grype scan results in JSON format"
    value: ${{ steps.process-results.outputs.results-json }}

runs:
  using: composite
  steps:
    - name: Validate Inputs
      if: ${{ (inputs.image == '' && inputs.path == '') || (inputs.image != '' && inputs.path != '') }}
      shell: bash
      run: |
        echo "Error: You must provide either 'image' or 'path' input."
        exit 1

    - name: Install Grype
      shell: bash
      env:
        GRYPE_VERSION: "0.110.0"
      run: |
        curl -sSfL "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_linux_amd64.tar.gz" -o "grype_${GRYPE_VERSION}_linux_amd64.tar.gz"
        curl -sSfL "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_checksums.txt" -o grype_checksums.txt
        grep "grype_${GRYPE_VERSION}_linux_amd64.tar.gz" grype_checksums.txt | sha256sum -c -
        tar xzf "grype_${GRYPE_VERSION}_linux_amd64.tar.gz" grype
        sudo mv grype /usr/local/bin/grype
        rm "grype_${GRYPE_VERSION}_linux_amd64.tar.gz" grype_checksums.txt

    - name: Scan Image for Vulnerabilities
      if: ${{ inputs.image != '' && inputs.path == '' }}
      shell: bash
      run: |
        grype ${{ inputs.image }} \
          -o json \
          --only-fixed \
          --file grype-results.json

    - name: Scan Path for Vulnerabilities
      if: ${{ inputs.path != '' && inputs.image == '' }}
      shell: bash
      run: |
        grype dir:${{ inputs.path }} \
          -o json \
          --only-fixed \
          --file grype-results.json

    - name: Display in Summary
      if: always()
      id: process-results
      shell: bash
      env:
        SEVERITY_CUTOFF_INPUT: ${{ inputs.severity-cutoff }}
        VERBOSITY: ${{ inputs.verbosity }}
      run: |
        set -euo pipefail

        echo "## 🔍 Vulnerability Scan Results" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"

        JSON_FILE="grype-results.json"
        if [ ! -f "$JSON_FILE" ]; then
          echo "✅ No vulnerabilities found!" >> "$GITHUB_STEP_SUMMARY"
          echo "results-json={}" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "results-json=$(jq -c . "$JSON_FILE")" >> "$GITHUB_OUTPUT"

        SEVERITY_CUTOFF="$(echo "$SEVERITY_CUTOFF_INPUT" | tr '[:lower:]' '[:upper:]' | tr -d '[:space:]')"
        VERBOSITY_NORMALIZED="$(echo "${VERBOSITY:-basic}" | tr '[:upper:]' '[:lower:]')"

        TOTAL="$(jq '[.matches // [] | .[]] | length' "$JSON_FILE")"
        CRITICAL="$(jq '[.matches // [] | .[] | select((.vulnerability.severity // "" | ascii_downcase) == "critical")] | length' "$JSON_FILE")"
        HIGH="$(jq '[.matches // [] | .[] | select((.vulnerability.severity // "" | ascii_downcase) == "high")] | length' "$JSON_FILE")"
        MEDIUM="$(jq '[.matches // [] | .[] | select((.vulnerability.severity // "" | ascii_downcase) == "medium")] | length' "$JSON_FILE")"
        LOW="$(jq '[.matches // [] | .[] | select((.vulnerability.severity // "" | ascii_downcase) == "low")] | length' "$JSON_FILE")"
        NEGLIGIBLE="$(jq '[.matches // [] | .[] | select((.vulnerability.severity // "" | ascii_downcase) == "negligible")] | length' "$JSON_FILE")"
        UNKNOWN="$(jq '[.matches // [] | .[] | select((.vulnerability.severity // "" | ascii_downcase) == "unknown")] | length' "$JSON_FILE")"

        echo "| Severity | Count |" >> "$GITHUB_STEP_SUMMARY"
        echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
        echo "| 🔴 Critical | $CRITICAL |" >> "$GITHUB_STEP_SUMMARY"
        echo "| 🟠 High | $HIGH |" >> "$GITHUB_STEP_SUMMARY"
        echo "| 🟡 Medium | $MEDIUM |" >> "$GITHUB_STEP_SUMMARY"
        echo "| 🔵 Low | $LOW |" >> "$GITHUB_STEP_SUMMARY"
        echo "| ⚪ Negligible | $NEGLIGIBLE |" >> "$GITHUB_STEP_SUMMARY"
        echo "| ❔ Unknown | $UNKNOWN |" >> "$GITHUB_STEP_SUMMARY"
        echo "| **Total** | **$TOTAL** |" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"

        write_vulnerability_basic() {
          local match="$1"
          local vuln_id artifact_name artifact_version fixed_versions

          vuln_id="$(echo "$match" | jq -r '.vulnerability.id // "UNKNOWN"')"
          artifact_name="$(echo "$match" | jq -r '.artifact.name // "unknown-artifact"')"
          artifact_version="$(echo "$match" | jq -r '.artifact.version // "unknown-version"')"
          fixed_versions="$(echo "$match" | jq -r '.vulnerability.fix.versions // [] | if length > 0 then join(", ") else "N/A" end')"

          echo "- **${vuln_id}** in \`${artifact_name}@${artifact_version}\` (Fixed: ${fixed_versions})" >> "$GITHUB_STEP_SUMMARY"
        }

        write_vulnerability_detailed() {
          local match="$1"
          local vuln_id artifact_name artifact_version fixed_versions
          local wrote_path=false

          vuln_id="$(echo "$match" | jq -r '.vulnerability.id // "UNKNOWN"')"
          artifact_name="$(echo "$match" | jq -r '.artifact.name // "unknown-artifact"')"
          artifact_version="$(echo "$match" | jq -r '.artifact.version // "unknown-version"')"
          fixed_versions="$(echo "$match" | jq -r '.vulnerability.fix.versions // [] | if length > 0 then join(", ") else "N/A" end')"

          echo "- **${vuln_id}**" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Artifact: \`${artifact_name}@${artifact_version}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Fixed Versions: ${fixed_versions}" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Detection Paths:" >> "$GITHUB_STEP_SUMMARY"

          while IFS= read -r primary_path; do
            if [ -n "$primary_path" ]; then
              echo "    - (primary) \`${primary_path}\`" >> "$GITHUB_STEP_SUMMARY"
              wrote_path=true
            fi
          done < <(echo "$match" | jq -r '.artifact.locations // [] | .[] | select(.annotations.evidence == "primary") | (.path // .accessPath // empty)')

          while IFS= read -r supporting_path; do
            if [ -n "$supporting_path" ]; then
              echo "    - (supporting) \`${supporting_path}\`" >> "$GITHUB_STEP_SUMMARY"
              wrote_path=true
            fi
          done < <(echo "$match" | jq -r '.artifact.locations // [] | .[] | select(.annotations.evidence == "supporting") | (.path // .accessPath // empty)')

          if [ "$wrote_path" = false ]; then
            echo "    - N/A" >> "$GITHUB_STEP_SUMMARY"
          fi
        }

        write_section() {
          local severity="$1"
          local title="$2"
          local count="$3"
          local collapsible="$4"

          if [ "$count" -le 0 ]; then
            return 0
          fi

          if [ "$collapsible" = "true" ]; then
            echo "<details><summary>${title} (${count})</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ${title} (${count})" >> "$GITHUB_STEP_SUMMARY"
          fi

          while IFS= read -r match; do
            if [ "$VERBOSITY_NORMALIZED" = "detailed" ]; then
              write_vulnerability_detailed "$match"
            else
              write_vulnerability_basic "$match"
            fi
            echo "" >> "$GITHUB_STEP_SUMMARY"
          done < <(jq -c --arg severity "$severity" '.matches // [] | .[] | select((.vulnerability.severity // "" | ascii_downcase) == ($severity | ascii_downcase))' "$JSON_FILE")

          if [ "$collapsible" = "true" ]; then
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
        }

        write_section "critical" "🔴 Critical Vulnerabilities" "$CRITICAL" "false"
        write_section "high" "🟠 High Vulnerabilities" "$HIGH" "false"
        write_section "medium" "🟡 Medium Vulnerabilities" "$MEDIUM" "true"
        write_section "low" "🔵 Low Vulnerabilities" "$LOW" "true"
        write_section "negligible" "⚪ Negligible Vulnerabilities" "$NEGLIGIBLE" "true"
        write_section "unknown" "❔ Unknown Vulnerabilities" "$UNKNOWN" "true"

        SHOULD_FAIL=false
        if [ -n "$SEVERITY_CUTOFF" ]; then
          if [[ "$SEVERITY_CUTOFF" == *"CRITICAL"* ]] && [ "$CRITICAL" -gt 0 ]; then
            SHOULD_FAIL=true
          fi
          if [[ "$SEVERITY_CUTOFF" == *"HIGH"* ]] && [ "$HIGH" -gt 0 ]; then
            SHOULD_FAIL=true
          fi
          if [[ "$SEVERITY_CUTOFF" == *"MEDIUM"* ]] && [ "$MEDIUM" -gt 0 ]; then
            SHOULD_FAIL=true
          fi
          if [[ "$SEVERITY_CUTOFF" == *"LOW"* ]] && [ "$LOW" -gt 0 ]; then
            SHOULD_FAIL=true
          fi
          if [[ "$SEVERITY_CUTOFF" == *"NEGLIGIBLE"* ]] && [ "$NEGLIGIBLE" -gt 0 ]; then
            SHOULD_FAIL=true
          fi
          if [[ "$SEVERITY_CUTOFF" == *"UNKNOWN"* ]] && [ "$UNKNOWN" -gt 0 ]; then
            SHOULD_FAIL=true
          fi
        fi

        if [ "$SHOULD_FAIL" = true ]; then
          exit 1
        fi
