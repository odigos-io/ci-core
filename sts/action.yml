# Before using this action, ensure that you have set up the necessary
# permissions and configurations as per the octo-sts/action documentation.

name: "A wrapper for octo-sts to fetch STS tokens for one or more odigos-io repos"
description: "Get STS tokens for one or more GitHub repos, writing a single gitconfig file"

inputs:
  # ── multi-pair (preferred) ──────────────────────────────────────────────────
  pairs:
    description: |
      Newline-separated list of "scope:identity" entries.
      Each entry requests a token for one repo.
      Duplicate scopes are skipped with a warning.
      Example (single):  odigos-io/my-repo:my-identity
      Example (multi):
        odigos-io/repo-a:identity-a
        odigos-io/repo-b:identity-b
    required: false
    default: ""

  # ── single-pair (backward-compatible) ──────────────────────────────────────
  scope:
    description: "GitHub repo scope for the STS token (e.g., odigos-io/ebpf-core)"
    required: false
    default: ${{ github.repository }}
  identity:
    description: "Identity to request from STS"
    required: false
    default: ""

  # ── shared ──────────────────────────────────────────────────────────────────
  output-git-config:
    description: "If true, writes a gitconfig file and includes it globally"
    required: false
    default: "true"
  domain:
    description: "The octo-sts domain to use"
    required: false
    default: "octo-sts.dev"

outputs:
  GIT_CONFIG_PATH:
    description: "Path to the git config file that covers all requested scopes"
    value: ${{ steps.fetch.outputs.GIT_CONFIG_PATH }}
  GH_TOKEN:
    description: "The STS token for the last (or only) scope — use for single-pair workflows"
    value: ${{ steps.fetch.outputs.GH_TOKEN }}

runs:
  using: composite
  steps:
    - name: Fetch STS tokens and configure git
      id: fetch
      shell: bash
      env:
        PAIRS:             ${{ inputs.pairs }}
        SCOPE:             ${{ inputs.scope }}
        IDENTITY:          ${{ inputs.identity }}
        OUTPUT_GIT_CONFIG: ${{ inputs.output-git-config }}
        DOMAIN:            ${{ inputs.domain }}
      run: node "${{ github.action_path }}/fetch.js"
