name: Generate Release Notes
description: Generates release notes for a release

inputs:
  tag:
    description: "Tag of the release"
    required: true
  release-branch:
    description: "Release branch"
    required: true
  github-token:
    description: "GitHub token"
    required: true
  dry-run:
    description: "If true, only generate and print release notes; do not upload artifact or update the GitHub release"
    required: false
    default: "false"

runs:
  using: composite
  steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch main and release branches
        shell: bash
        run: |
          git fetch origin main
          git fetch origin 'refs/heads/releases/*:refs/remotes/origin/releases/*' 2>/dev/null || true

      - name: Compute START_SHA and END_SHA
        shell: bash
        id: shas
        run: |
          set -e
          TAG="${{ inputs.tag }}"
          END_SHA=$(git rev-parse HEAD)
          echo "end_sha=${END_SHA}" >> $GITHUB_OUTPUT

          # Only consider exact semver release tags (vX.Y.Z or vX.Y.Z-rcN), not namespaced ones like profiles/v1.17.0
          is_release_tag() { [[ "$1" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$ ]]; }
          list_merged_release_tags() {
            git tag --merged HEAD --sort=-version:refname | while read t; do is_release_tag "$t" && echo "$t"; done
          }

          # --- RC tag: vX.Y.Z-rcN ---
          if [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)-rc([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            RC_NUM="${BASH_REMATCH[4]}"
            BASE="${MAJOR}.${MINOR}.${PATCH}"

            # Find previous RC for this minor: same vX.Y.Z-rc*, lower rc number, merged in HEAD
            PREV_RC_TAG=""
            while read t; do
              [[ "$t" == "$TAG" ]] && continue
              if [[ "$t" =~ ^v${BASE}-rc([0-9]+)$ ]]; then
                N="${BASH_REMATCH[1]}"
                if [[ "$N" -lt "$RC_NUM" ]]; then
                  PREV_RC_TAG="$t"
                  break
                fi
              fi
            done < <(list_merged_release_tags)

            if [ -n "$PREV_RC_TAG" ]; then
              START_SHA=$(git rev-parse "$PREV_RC_TAG")
              echo "start_sha=${START_SHA}" >> $GITHUB_OUTPUT
              echo "Scenario: RC after previous RC, PREV_RC_TAG=$PREV_RC_TAG"
            else
              # First RC for this minor: since previous minor's branch point off main
              PREV_MINOR=$((MINOR - 1))
              PREV_RELEASE_BRANCH="origin/releases/v${MAJOR}.${PREV_MINOR}.0"
              START_SHA=$(git merge-base origin/main "$PREV_RELEASE_BRANCH")
              echo "start_sha=${START_SHA}" >> $GITHUB_OUTPUT
              echo "Scenario: first RC for minor, PREV_RELEASE_BRANCH=$PREV_RELEASE_BRANCH"
            fi

          # --- Stable vX.Y.0 (first stable for minor) ---
          elif [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.0$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PREV_MINOR=$((MINOR - 1))
            PREV_RELEASE_BRANCH="origin/releases/v${MAJOR}.${PREV_MINOR}.0"
            START_SHA=$(git merge-base origin/main "$PREV_RELEASE_BRANCH")
            echo "start_sha=${START_SHA}" >> $GITHUB_OUTPUT
            echo "Scenario: first stable for minor, PREV_RELEASE_BRANCH=$PREV_RELEASE_BRANCH"

          # --- Stable vX.Y.Z patch (Z >= 1) ---
          elif [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"

            # Previous stable = same minor, lower patch by semver (vX.Y.(Z-1), vX.Y.(Z-2), ...)
            PREV_STABLE_TAG=""
            for ((p = PATCH - 1; p >= 0; p--)); do
              CANDIDATE="v${MAJOR}.${MINOR}.${p}"
              if git rev-parse "$CANDIDATE" >/dev/null 2>/dev/null; then
                if git merge-base --is-ancestor "$CANDIDATE" HEAD 2>/dev/null; then
                  PREV_STABLE_TAG="$CANDIDATE"
                  break
                fi
              fi
            done

            if [ -n "$PREV_STABLE_TAG" ]; then
              START_SHA=$(git rev-parse "$PREV_STABLE_TAG")
              echo "start_sha=${START_SHA}" >> $GITHUB_OUTPUT
              echo "Scenario: patch release, PREV_STABLE_TAG=$PREV_STABLE_TAG"
            else
              echo "No previous stable tag found for minor, using merge-base with main"
              START_SHA=$(git merge-base origin/main HEAD)
              echo "start_sha=${START_SHA}" >> $GITHUB_OUTPUT
            fi

          else
            echo "Unrecognized tag format, using merge-base with main"
            START_SHA=$(git merge-base origin/main HEAD)
            echo "start_sha=${START_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      # This is temporary until https://github.com/kubernetes/release/pull/4272 is merged
      - name: Build release-notes tool
        shell: bash
        run: |
          git clone --depth 1 --branch release-notes-custom-regex https://github.com/damemi/k8s-release.git /tmp/k8s-release
          cd /tmp/k8s-release
          go build -o release-notes ./cmd/release-notes
          echo "RELEASE_NOTES_BIN=$(pwd)/release-notes" >> $GITHUB_ENV

      - name: Generate release notes
        shell: bash
        env:
          GITHUB_TOKEN: ${{ inputs.github-token }}
        run: |
          ${{ env.RELEASE_NOTES_BIN }} \
            --org='odigos-io' \
            --repo='odigos' \
            --required-author='' \
            --dependencies=false \
            --release-note-regex='(?sU)```release-notes?\r?\n(?P<note>.+)\r?\n```' \
            --branch=${{ inputs.release-branch }} \
            --start-sha=${{ steps.shas.outputs.start_sha }} \
            --end-sha=${{ steps.shas.outputs.end_sha }} \
            --output=release-notes.md

      - name: Print release notes
        shell: bash
        run: |
          echo "## Generated release notes"
          echo '```'
          cat release-notes.md
          echo '```'

      - name: Dry run (skipping upload and release update)
        if: inputs.dry-run == 'true'
        shell: bash
        run: echo "Dry run enabled — artifact upload and gh release edit were skipped."

      - name: Upload release notes
        if: inputs.dry-run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

      - name: Update GitHub release body
        if: inputs.dry-run != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ inputs.github-token }}
        run: |
          gh release edit "${{ inputs.tag }}" --repo "${{ github.repository }}" --notes-file release-notes.md
