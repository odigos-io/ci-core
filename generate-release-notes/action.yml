name: Generate Release Notes
description: |
  Generates release notes for a release. Authenticate with either an STS identity
  (recommended; requires id-token: write in the calling job) or a github-token
  for backward compatibility.

inputs:
  tag:
    description: "Tag of the release."
    required: true
  release-branch:
    description: "Release branch"
    required: true
  github-token:
    description: "GitHub token (required if sts_identity is not set; used for checkout, API, and gh release edit)"
    required: false
  sts_identity:
    description: "STS identity for short-lived tokens (scope is github.repository). When set, use this instead of github-token; calling job must have id-token: write."
    required: false
    default: ""
  dry-run:
    description: "If true, generate and upload release notes as usual (so other steps can use the artifact) but skip updating the GitHub release body with gh release edit"
    required: false
    default: "false"
  use-branch-head:
    description: "If true, checkout the release branch and use its HEAD as end_sha (for tags not published yet); skip updating the GitHub release body"
    required: false
    default: "false"

outputs:
  release_notes:
    description: "Generated release notes (full content of release-notes.md)"
    value: ${{ steps.notes.outputs.release_notes }}

runs:
  using: composite
  steps:
      - name: Validate token input
        shell: bash
        run: |
          if [ -z "${{ inputs.sts_identity }}" ] && [ -z "${{ inputs.github-token }}" ]; then
            echo "::error::Either sts_identity or github-token must be set."
            exit 1
          fi

      - name: Get STS token
        id: sts
        if: inputs.sts_identity != ''
        uses: odigos-io/ci-core/sts@main
        with:
          scope: ${{ github.repository }}
          identity: ${{ inputs.sts_identity }}

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.use-branch-head == 'true' && inputs.release-branch || inputs.tag }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.sts.outputs.GH_TOKEN || inputs.github-token }}

      - name: Fetch main and release branches
        shell: bash
        run: |
          git fetch origin main
          git fetch origin 'refs/heads/releases/*:refs/remotes/origin/releases/*' 2>/dev/null || true

      - name: Compute START_SHA and END_SHA
        shell: bash
        id: shas
        run: |
          set -e
          TAG="${{ inputs.tag }}"
          END_SHA=$(git rev-parse HEAD)
          echo "end_sha=${END_SHA}" >> $GITHUB_OUTPUT

          # Only consider exact semver release tags (vX.Y.Z or vX.Y.Z-rcN), not namespaced ones like profiles/v1.17.0
          is_release_tag() { [[ "$1" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$ ]]; }
          list_merged_release_tags() {
            git tag --merged HEAD --sort=-version:refname | while read t; do is_release_tag "$t" && echo "$t"; done
          }

          # --- RC tag: vX.Y.Z-rcN ---
          if [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)-rc([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            RC_NUM="${BASH_REMATCH[4]}"
            BASE="${MAJOR}.${MINOR}.${PATCH}"

            # Find previous RC for this minor: same vX.Y.Z-rc*, lower rc number, merged in HEAD
            PREV_RC_TAG=""
            while read t; do
              [[ "$t" == "$TAG" ]] && continue
              if [[ "$t" =~ ^v${BASE}-rc([0-9]+)$ ]]; then
                N="${BASH_REMATCH[1]}"
                if [[ "$N" -lt "$RC_NUM" ]]; then
                  PREV_RC_TAG="$t"
                  break
                fi
              fi
            done < <(list_merged_release_tags)

            if [ -n "$PREV_RC_TAG" ]; then
              START_SHA=$(git rev-parse "$PREV_RC_TAG")
              echo "start_sha=${START_SHA}" >> $GITHUB_OUTPUT
              echo "Scenario: RC after previous RC, PREV_RC_TAG=$PREV_RC_TAG"
            else
              # First RC for this minor: since previous minor's branch point off main
              PREV_MINOR=$((MINOR - 1))
              PREV_RELEASE_BRANCH="origin/releases/v${MAJOR}.${PREV_MINOR}.0"
              START_SHA=$(git merge-base origin/main "$PREV_RELEASE_BRANCH")
              echo "start_sha=${START_SHA}" >> $GITHUB_OUTPUT
              echo "Scenario: first RC for minor, PREV_RELEASE_BRANCH=$PREV_RELEASE_BRANCH"
            fi

          # --- Stable vX.Y.0 (first stable for minor) ---
          elif [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.0$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PREV_MINOR=$((MINOR - 1))
            PREV_RELEASE_BRANCH="origin/releases/v${MAJOR}.${PREV_MINOR}.0"
            START_SHA=$(git merge-base origin/main "$PREV_RELEASE_BRANCH")
            echo "start_sha=${START_SHA}" >> $GITHUB_OUTPUT
            echo "Scenario: first stable for minor, PREV_RELEASE_BRANCH=$PREV_RELEASE_BRANCH"

          # --- Stable vX.Y.Z patch (Z >= 1) ---
          elif [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"

            # Previous stable = same minor, lower patch by semver (vX.Y.(Z-1), vX.Y.(Z-2), ...)
            PREV_STABLE_TAG=""
            for ((p = PATCH - 1; p >= 0; p--)); do
              CANDIDATE="v${MAJOR}.${MINOR}.${p}"
              if git rev-parse "$CANDIDATE" >/dev/null 2>/dev/null; then
                if git merge-base --is-ancestor "$CANDIDATE" HEAD 2>/dev/null; then
                  PREV_STABLE_TAG="$CANDIDATE"
                  break
                fi
              fi
            done

            if [ -n "$PREV_STABLE_TAG" ]; then
              START_SHA=$(git rev-parse "$PREV_STABLE_TAG")
              echo "start_sha=${START_SHA}" >> $GITHUB_OUTPUT
              echo "Scenario: patch release, PREV_STABLE_TAG=$PREV_STABLE_TAG"
            else
              echo "No previous stable tag found for minor, using merge-base with main"
              START_SHA=$(git merge-base origin/main HEAD)
              echo "start_sha=${START_SHA}" >> $GITHUB_OUTPUT
            fi

          else
            echo "Unrecognized tag format, using merge-base with main"
            START_SHA=$(git merge-base origin/main HEAD)
            echo "start_sha=${START_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      # This is temporary until https://github.com/kubernetes/release/pull/4272 is merged
      - name: Build release-notes tool
        shell: bash
        run: |
          git clone --depth 1 --branch release-notes-custom-regex https://github.com/damemi/k8s-release.git /tmp/k8s-release
          cd /tmp/k8s-release
          go build -o release-notes ./cmd/release-notes
          echo "RELEASE_NOTES_BIN=$(pwd)/release-notes" >> $GITHUB_ENV

      - name: Generate release notes
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.sts.outputs.GH_TOKEN || inputs.github-token }}
        run: |
          # GITHUB_REPOSITORY is owner/repo (e.g. odigos-io/odigos). Strip the longest prefix through the last "/" to get just the repo name for --repo.
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          ${{ env.RELEASE_NOTES_BIN }} \
            --org='odigos-io' \
            --repo="${REPO_NAME}" \
            --required-author='' \
            --dependencies=false \
            --release-note-regex='(?sU)```release-notes?\r?\n(?P<note>.+)\r?\n```' \
            --branch=${{ inputs.release-branch }} \
            --start-sha=${{ steps.shas.outputs.start_sha }} \
            --end-sha=${{ steps.shas.outputs.end_sha }} \
            --output=release-notes.md

      - name: Set release notes output
        id: notes
        shell: bash
        run: |
          # GitHub multiline output format is name<<DELIMITER, content, DELIMITER.
          # Use a random delimiter so the notes content cannot accidentally contain it
          # and end the value early.
          DELIM="release_notes_eof_$(openssl rand -hex 8)"
          echo "release_notes<<${DELIM}" >> $GITHUB_OUTPUT
          cat release-notes.md >> $GITHUB_OUTPUT
          echo "${DELIM}" >> $GITHUB_OUTPUT

      - name: Truncate release notes for GitHub
        id: truncate
        shell: bash
        run: |
          MAX=124000
          NOTES=$(cat release-notes.md)
          if [ "${#NOTES}" -gt "$MAX" ]; then
            echo "${NOTES:0:$MAX}"$'\n\n_Release notes truncated — see the release-notes.md asset on this release for the full content._' > release-notes-gh.md
            echo "truncated=true" >> $GITHUB_OUTPUT
          else
            cp release-notes.md release-notes-gh.md
            echo "truncated=false" >> $GITHUB_OUTPUT
          fi

      - name: Print release notes
        shell: bash
        run: |
          echo "## Generated release notes"
          echo '```'
          cat release-notes.md
          echo '```'

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: |
            release-notes.md
            release-notes-gh.md

      - name: Dry run (skipping release update)
        if: inputs.dry-run == 'true'
        shell: bash
        run: echo "Dry run enabled — gh release edit was skipped; artifact was still uploaded for downstream steps."

      - name: Update GitHub release body
        if: inputs.dry-run != 'true' && inputs.use-branch-head != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.sts.outputs.GH_TOKEN || inputs.github-token }}
        run: |
          gh release edit "${{ inputs.tag }}" --repo "${{ github.repository }}" --notes-file release-notes-gh.md
          if [ "${{ steps.truncate.outputs.truncated }}" == "true" ]; then
            gh release upload "${{ inputs.tag }}" release-notes.md --repo "${{ github.repository }}" --clobber
          fi
