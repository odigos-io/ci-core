name: Tag Release

# Manually triggered release workflow. Calculates the next version, pauses for
# human approval via the "release-gate" environment, then creates an annotated
# git tag and a GitHub release.
#
# Version bump logic (based on the latest tag reachable from base_branch):
#
#   major  v1.2.3        → v2.0.0
#   minor  v1.2.3        → v1.3.0
#   patch  v1.2.3        → v1.2.4
#
#   (no tags)            → treated as v0.0.0 baseline for all bump types
#
#   pre    v1.2.3        → v1.3.0-pre.0   + creates releases/1.3.x branch
#   pre    v1.3.0-pre.0  → v1.3.0-pre.1
#   pre    v1.3.0-rc.0   → ERROR (cannot go back to pre after rc)
#
#   rc     v1.2.3        → v1.3.0-rc.0    + creates releases/1.3.x branch
#   rc     v1.3.0-pre.N  → v1.3.0-rc.0    (releases/1.3.x already exists)
#   rc     v1.3.0-rc.N   → v1.3.0-rc.N+1  (releases/1.3.x already exists)
#
# A release branch (releases/X.Y.x) is created whenever a new rc or a first
# pre is started. If the branch already exists the step is skipped safely.
#
# Requires a GitHub Environment named "release-gate" configured with
# required reviewers to serve as the confirmation gate.

permissions: read-all

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options: [patch, minor, major, pre, rc]
      base_branch:
        description: "Base branch to tag (e.g. main, releases/1.9.x)"
        required: true
        default: main
        type: string

jobs:
  calculate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      current_version: ${{ steps.calc.outputs.current_version }}
      new_version: ${{ steps.calc.outputs.new_version }}
      create_branch: ${{ steps.calc.outputs.create_branch }}
      release_branch: ${{ steps.calc.outputs.release_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: Calculate new version
        id: calc
        run: |
          BUMP="${{ inputs.bump }}"

          # Find latest tag reachable from the base branch.
          # For pre/rc bumps include pre-release tags; otherwise stable only.
          if [[ "$BUMP" == "pre" || "$BUMP" == "rc" ]]; then
            CURRENT=$(git tag --merged HEAD --list 'v[0-9]*' \
              | sort -V | tail -1)
          else
            CURRENT=$(git tag --merged HEAD --list 'v[0-9]*' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V | tail -1)
          fi
          CURRENT=${CURRENT:-v0.0.0}

          # Parse components
          VER=${CURRENT#v}
          MAJOR=$(echo "$VER" | cut -d. -f1)
          MINOR=$(echo "$VER" | cut -d. -f2)
          PATCH_FULL=$(echo "$VER" | cut -d. -f3)
          PATCH=$(echo "$PATCH_FULL" | cut -d- -f1)
          PRE=$(echo "$PATCH_FULL" | cut -s -d- -f2-)
          PRE_TYPE=$(echo "$PRE" | cut -d. -f1)
          PRE_NUM=$(echo "$PRE" | cut -d. -f2)

          CREATE_BRANCH="false"
          BRANCH=""

          case "$BUMP" in
            major)
              NEW="v$((MAJOR+1)).0.0"
              ;;
            minor)
              NEW="v${MAJOR}.$((MINOR+1)).0"
              ;;
            patch)
              NEW="v${MAJOR}.${MINOR}.$((PATCH+1))"
              ;;
            pre)
              if [[ "$PRE_TYPE" == "rc" ]]; then
                echo "::error::Invalid: 'pre' cannot follow an rc (${CURRENT})."
                exit 1
              elif [[ "$PRE_TYPE" == "pre" ]]; then
                NEW="v${MAJOR}.${MINOR}.${PATCH}-pre.$((PRE_NUM+1))"
              else
                NEW="v${MAJOR}.$((MINOR+1)).0-pre.0"
                CREATE_BRANCH="true"
                BRANCH="releases/${MAJOR}.$((MINOR+1)).x"
              fi
              ;;
            rc)
              if [[ "$PRE_TYPE" == "rc" ]]; then
                NEW="v${MAJOR}.${MINOR}.${PATCH}-rc.$((PRE_NUM+1))"
              elif [[ "$PRE_TYPE" == "pre" ]]; then
                NEW="v${MAJOR}.${MINOR}.${PATCH}-rc.0"
              else
                NEW="v${MAJOR}.$((MINOR+1)).0-rc.0"
              fi
              CREATE_BRANCH="true"
              # Derive branch from the computed new version's major.minor
              _VER=${NEW#v}
              BRANCH="releases/$(echo "$_VER" | cut -d. -f1).$(echo "$_VER" | cut -d. -f2).x"
              ;;
          esac

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "new_version=${NEW}"         >> "$GITHUB_OUTPUT"
          echo "create_branch=${CREATE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "release_branch=${BRANCH}"   >> "$GITHUB_OUTPUT"

      - name: Write release preview summary
        run: |
          {
            echo "### Release Preview"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Base branch | \`${{ inputs.base_branch }}\` |"
            echo "| Bump type | \`${{ inputs.bump }}\` |"
            # yamllint disable-line rule:line-length
            echo "| Current version | \`${{ steps.calc.outputs.current_version }}\` |"
            echo "| **New version** | \`${{ steps.calc.outputs.new_version }}\` |"
            if [[ "${{ steps.calc.outputs.create_branch }}" == "true" ]]; then
              # yamllint disable-line rule:line-length
              echo "| Release branch | \`${{ steps.calc.outputs.release_branch }}\` *(will be created)* |"
            fi
            echo ""
            echo "> Approve the **release-gate** environment below to proceed."
          } >> "$GITHUB_STEP_SUMMARY"

  # This job runs inside the "release-gate" environment.
  # Configure that environment with required reviewers so GitHub pauses
  # here and asks for manual approval before the tag job proceeds.
  # Rejecting or dismissing cancels the workflow without creating any tag.
  confirm:
    needs: calculate
    runs-on: ubuntu-latest
    environment: release-gate
    steps:
      - name: Release approved
        run: |
          echo "Releasing ${{ needs.calculate.outputs.new_version }} \
          from ${{ inputs.base_branch }}"

  tag:
    needs: [calculate, confirm]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for STS OIDC token exchange
      contents: read
    env:
      NEW_VERSION: ${{ needs.calculate.outputs.new_version }}
      CREATE_BRANCH: ${{ needs.calculate.outputs.create_branch }}
      RELEASE_BRANCH: ${{ needs.calculate.outputs.release_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false # STS handles auth

      - name: Get STS token
        id: sts
        uses: odigos-io/ci-core/sts@main
        with:
          scope: odigos-io/ci-core
          identity: tag-releaser

      - name: Configure git identity
        run: |
          git config user.name  "ci-core[bot]"
          git config user.email "ci-core-bot@odigos.io"

      - name: Fail if tag already exists
        run: |
          if git rev-parse "${NEW_VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag ${NEW_VERSION} already exists"; exit 1
          fi

      - name: Create & push tag
        run: |
          git tag -a "${NEW_VERSION}" -m "Release ${NEW_VERSION}"
          git push origin "${NEW_VERSION}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ steps.sts.outputs.GH_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${NEW_VERSION}" == *"-pre."* || "${NEW_VERSION}" == *"-rc."* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${NEW_VERSION}" \
            --title "${NEW_VERSION}" \
            --generate-notes \
            $PRERELEASE_FLAG

      - name: Create & push release branch (patch / new rc)
        if: env.CREATE_BRANCH == 'true'
        run: |
          if git ls-remote --exit-code --heads origin \
            "${RELEASE_BRANCH}" >/dev/null 2>&1; then
            echo "Branch ${RELEASE_BRANCH} already exists; skipping."
          else
            git checkout -b "${RELEASE_BRANCH}"
            git push origin "${RELEASE_BRANCH}"
          fi

      - name: Write release complete summary
        run: |
          {
            echo "### Release Complete"
            echo ""
            echo "- Tag: \`${NEW_VERSION}\`"
            if [[ "${CREATE_BRANCH}" == "true" ]]; then
              echo "- Branch: \`${RELEASE_BRANCH}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
